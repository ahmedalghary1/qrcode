<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | QR Smart Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/auth.js" data-auth="login" defer></script>
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card" aria-labelledby="loginTitle">
      <a class="brand login-brand" href="login.html" aria-label="QR Smart Links">
        <span class="brand-mark"><i class="fa-solid fa-qrcode"></i></span>
        <span>QR Smart Links</span>
      </a>

      <div class="login-heading">
        <p class="eyebrow"><i class="fa-solid fa-lock"></i> دخول لوحة التحكم</p>
        <h1 id="loginTitle">سجل الدخول لإدارة روابط QR</h1>
      </div>

      <form id="loginForm" class="login-form" novalidate>
        <label class="field">
          <span>اسم المستخدم</span>
          <input id="usernameInput" name="username" type="text" autocomplete="username" required>
        </label>
        <label class="field">
          <span>كلمة المرور</span>
          <input id="passwordInput" name="password" type="password" autocomplete="current-password" required>
        </label>
        <p id="loginError" class="auth-error" hidden></p>
        <button id="loginSubmitBtn" type="submit" class="btn btn-primary">
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
          دخول
        </button>
      </form>
    </section>
  </main>
</body>
</html>
